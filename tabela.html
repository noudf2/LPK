<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela - Liga</title>

<style>
body{
    font-family:Arial;
    background:#e5e7eb;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    background:#2563eb;
    color:white;
    padding:20px;
    border-radius:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Tabela Ligowa</h1>

<div class="card">

<table>
<thead>
<tr>
<th>#</th>
<th>Drużyna</th>
<th>M</th>
<th>Z</th>
<th>R</th>
<th>P</th>
<th>BR+</th>
<th>BR-</th>
<th>PKT</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 TWOJA KONFIGURACJA
const firebaseConfig = {
  apiKey: "AIzaSyCCAi0uJeOCv9TDz2vEaX4GM07aeXiq41o",
  authDomain: "liga-polskich-klubow.firebaseapp.com",
  projectId: "liga-polskich-klubow",
  storageBucket: "liga-polskich-klubow.firebasestorage.app",
  messagingSenderId: "144909575974",
  appId: "1:144909575974:web:1d4d79b565ba9f3ffec3e7"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📦 kolekcja
const teamsRef = collection(db, "teams");

// 📊 LIVE TABELA
onSnapshot(teamsRef,(snap)=>{

    let teams = [];

    snap.forEach(doc=>{
        teams.push(doc.data());
    });

    // sortowanie (punkty, różnica bramek)
    teams.sort((a,b)=>
        b.points - a.points ||
        (b.gf - b.ga) - (a.gf - a.ga)
    );

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    teams.forEach((t,index)=>{
        table.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${t.name}</td>
            <td>${t.played}</td>
            <td>${t.won}</td>
            <td>${t.draw}</td>
            <td>${t.lost}</td>
            <td>${t.gf}</td>
            <td>${t.ga}</td>
            <td><b>${t.points}</b></td>
        </tr>
        `;
    });

});

</script>

</body>
</html>
