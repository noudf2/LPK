<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moje linki</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      gap: 20px;
    }

    a {
      text-decoration: none;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .discord {
      background: #5865F2;
    }

    .discord:hover {
      background: #4752c4;
    }

    .tiktok {
      background: #000000;
      border: 2px solid #25F4EE;
    }

    .tiktok:hover {
      background: #111;
    }
  </style>
</head>
<body>

  <h1>Moje linki 🌐</h1>

  <div class="links">
    <a class="discord" href="https://discord.gg/Ert2c9mU7Q" target="_blank">Discord</a>
    <a class="tiktok" href="https://www.tiktok.com" target="_blank">TikTok</a>
  </div>

</body>
</html>
